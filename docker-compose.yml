version: '3.8'

services:
  web:
    build: .
    command: bash -c "./scripts/run.sh"
    volumes:
      - .:/app
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/fastapi_db
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=fastapi_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d fastapi_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
